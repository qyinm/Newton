scenario:
  id: cross-platform-login-smoke
  title: Cross-platform login smoke
  source_refs:
    - qa/inputs/tickets.md#login
  risk_category: functional
  priority: P0
  environments: [staging]

targets:
  - id: web
    platform: web
    backend: playwright
    base_url: https://staging.example.com
  - id: ios
    platform: ios
    backend: maestro
    bundle_id: com.example.app
    device:
      model: iPhone 15

steps:
  - id: enter-email
    action: input_text
    value: qa@example.com
    target:
      web:
        role: textbox
        name: Email
      ios:
        accessibility_id: emailField
  - id: enter-password
    action: input_text
    value: password123
    secure: true
    target:
      web:
        test_id: password-input
      ios:
        accessibility_id: passwordField
  - id: submit
    action: tap
    target:
      web:
        role: button
        name: Log in
      ios:
        accessibility_id: loginButton
  - id: assert-home
    action: assert_visible
    target:
      web:
        text: Dashboard
      ios:
        text: Home

evidence:
  screenshots: on_failure
  video: true
  logs: true
