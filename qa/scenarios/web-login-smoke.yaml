scenario:
  id: web-login-smoke
  title: Web login smoke
  source_refs:
    - qa/inputs/tickets.md#login
  risk_category: functional
  priority: P0
  environments: [staging]

targets:
  - id: web
    platform: web
    backend: playwright
    base_url: https://staging.example.com

steps:
  - id: open-login
    action: navigate
    target:
      web:
        url: /login
  - id: enter-email
    action: input_text
    value: qa@example.com
    target:
      web:
        role: textbox
        name: Email
  - id: enter-password
    action: input_text
    value: password123
    secure: true
    target:
      web:
        test_id: password-input
  - id: submit
    action: tap
    target:
      web:
        role: button
        name: Log in
  - id: assert-dashboard
    action: assert_visible
    target:
      web:
        text: Dashboard

evidence:
  screenshots: on_failure
  video: true
  logs: true
  traces: true
