<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Newton Dogfood Permission Denied Fixture</title>
  </head>
  <body>
    <main>
      <h1>Login</h1>
      <p>This fixture intentionally denies protected home access for failure evidence.</p>
      <form id="login-form">
        <label>Email <input aria-label="Email" name="email" type="email" /></label>
        <label>Password <input data-testid="password-input" name="password" type="password" /></label>
        <button type="submit">Log in</button>
      </form>
      <section id="locked" hidden>
        <h2>Account recovery required</h2>
        <p>Permission denied: the protected home screen is intentionally unavailable in this fixture.</p>
      </section>
    </main>
    <script>
      document.getElementById('login-form').addEventListener('submit', (event) => {
        event.preventDefault();
        document.getElementById('locked').hidden = false;
        history.pushState({}, '', '/locked');
      });
    </script>
  </body>
</html>
