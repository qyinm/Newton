scenario:
  id: login-smoke
  title: Login smoke
  source_refs:
  - qa/dogfood/login/inputs/ticket.md
  risk_category: functional
  priority: P0
  environments:
  - local
targets:
- id: web
  platform: web
  backend: playwright
  base_url: http://127.0.0.1:8000
steps:
- id: open-login
  action: navigate
  target:
    web:
      url: /login.html
- id: enter-email
  action: input_text
  target:
    web:
      role: textbox
      name: Email
  value: qa@example.com
- id: enter-password
  action: input_text
  target:
    web:
      test_id: password-input
  value: password123
  secure: true
- id: submit
  action: tap
  target:
    web:
      role: button
      name: Log in
- id: assert-dashboard
  action: assert_visible
  target:
    web:
      text: Dashboard
evidence:
  screenshots: on_failure
  video: false
  logs: true
  traces: true
