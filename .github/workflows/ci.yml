name: CI

on:
  push:
    branches: [main, 'release/**']
    tags: ['v*']
  pull_request:

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Newton for fast tests
        run: python -m pip install -e '.[dev]'
      - name: Run unit and contract tests
        run: pytest -v --ignore=tests/test_web_playwright.py --ignore=tests/test_dogfood.py
      - name: Run planning eval benchmark
        run: newton qa eval-planning qa/evals/planning --out /tmp/newton-planning-eval --min-score 100

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Newton with web extras
        run: python -m pip install -e '.[dev,web]'
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run browser integration tests
        run: pytest -v tests/test_web_playwright.py tests/test_dogfood.py
      - name: Upload Playwright failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          if-no-files-found: ignore
          path: |
            qa/dogfood/login/runs/**/playwright-trace.zip
            qa/dogfood/login/runs/**/*.png
            /tmp/pytest-of-runner/**/playwright-trace.zip
            /tmp/pytest-of-runner/**/*.png

  package-smoke:
    runs-on: ubuntu-latest
    needs: [fast-tests, browser-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Create clean smoke environment
        run: python -m venv .smoke-venv
      - name: Install built wheel with web extras
        run: |
          WHEEL="$(ls dist/newton_qa-*.whl)"
          .smoke-venv/bin/python -m pip install "${WHEEL}[web]"
      - name: Install Chromium
        run: .smoke-venv/bin/python -m playwright install --with-deps chromium
      - name: Smoke installed CLI
        run: |
          .smoke-venv/bin/newton version
          .smoke-venv/bin/newton qa validate qa/scenarios/web-login-smoke.yaml
          .smoke-venv/bin/newton qa bundle-validate qa/plans/login
          .smoke-venv/bin/newton qa run qa/scenarios/web-login-smoke.yaml \
            --target web \
            --backend dry-run \
            --out /tmp/newton-package-smoke-runs
